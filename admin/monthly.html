<!-- ── ADMIN: 📆 Monthly Attendance ──
     admin/monthly.html
     Loaded by tab-admin.html when this sub-tab is first clicked.
-->

    <!-- ── MONTHLY ATTENDANCE ── -->
    <div id="admin-monthly" class="admin-section" style="display:none;">
      <div class="admin-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
          <div class="admin-card-title" style="margin-bottom:0;font-size:0.9rem;">📆 MONTHLY ATTENDANCE</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <select id="monthly-team-filter" onchange="reRenderMonthly()" style="padding:7px 12px;background:#0d1424;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.78rem;outline:none;">
              <option value="all">All Teams</option>
              <option value="BB">Berbice (BB)</option>
              <option value="PR">Providence (PR)</option>
            </select>
            <span id="monthly-month-lbl" style="font-size:0.72rem;color:var(--accent2);font-weight:700;"></span>
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;justify-content:center;">
          <span class="wk-leg p">P — Present</span>
          <span class="wk-leg l">L — Late</span>
          <span class="wk-leg a">A — Absent</span>
          <span class="wk-leg s">S — Sick</span>
          <span class="wk-leg off">OFF / No data</span>
        </div>
        <div style="overflow-x:auto;" id="monthly-table-wrap">
          <div style="text-align:center;color:var(--muted);padding:20px;">Loading monthly data...</div>
        </div>
        <div id="monthly-summary" style="margin-top:12px;display:none;grid-template-columns:repeat(4,1fr);gap:8px;">
          <div class="rp-stat"><div class="rp-stat-val" id="ms-present" style="color:var(--green);">0</div><div class="rp-stat-lbl">Present</div></div>
          <div class="rp-stat"><div class="rp-stat-val" id="ms-late"    style="color:var(--gold);">0</div><div class="rp-stat-lbl">Late</div></div>
          <div class="rp-stat"><div class="rp-stat-val" id="ms-absent"  style="color:var(--red);">0</div><div class="rp-stat-lbl">Absent</div></div>
          <div class="rp-stat"><div class="rp-stat-val" id="ms-rate"    style="color:var(--cyan);">0%</div><div class="rp-stat-lbl">Att Rate</div></div>
        </div>
      </div>
    </div>
