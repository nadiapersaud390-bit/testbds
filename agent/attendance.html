<!-- ── AGENT PROFILE: 📅 Attendance ──
     agent/attendance.html
     Loaded by the agent profile panel when this sub-tab is first clicked.
-->

    <div id="ap-attendance" style="display:none;">

      <!-- Current month calendar -->
      <div class="ap-card">
        <div class="ap-card-title">📅 <span id="ap-cal-month-lbl">THIS MONTH</span> — DAILY VIEW</div>
        <div class="ap-mini-cal" id="ap-cal-current"></div>
        <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;font-size:0.5rem;font-weight:800;letter-spacing:1px;">
          <span style="color:#34d399;">■ Present</span>
          <span style="color:#fbbf24;">■ Late</span>
          <span style="color:#f87171;">■ Absent/Sick</span>
          <span style="color:#60a5fa;">■ Other</span>
          <span style="color:#2a3a55;">■ No Data / OFF</span>
        </div>
      </div>

      <!-- Previous month calendar -->
      <div class="ap-card">
        <div class="ap-card-title">📅 <span id="ap-prev-month-lbl">PREVIOUS MONTH</span> — DAILY VIEW</div>
        <div class="ap-mini-cal" id="ap-cal-prev"></div>
      </div>

      <!-- Weekly breakdown bars -->
      <div class="ap-card">
        <div class="ap-card-title">📊 WEEKLY BREAKDOWN — THIS MONTH</div>
        <div class="ap-week-bars" id="ap-week-bars"></div>
      </div>

      <!-- Mark today -->
      <div class="ap-card">
        <div class="ap-card-title">✏️ MARK TODAY</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="mark-absent-btn" onclick="markAgentAbsent('P')" style="border-color:rgba(52,211,153,0.4);color:#34d399;">✅ Present</button>
          <button class="mark-absent-btn" onclick="markAgentAbsent('L')" style="border-color:rgba(251,191,36,0.4);color:#fbbf24;">🕐 Late</button>
          <button class="mark-absent-btn" onclick="markAgentAbsent('A')" style="border-color:rgba(248,113,113,0.4);color:#f87171;">❌ Absent</button>
          <button class="mark-absent-btn" onclick="markAgentAbsent('S')" style="border-color:rgba(96,165,250,0.3);color:var(--accent);">🤒 Sick</button>
          <button class="mark-absent-btn" onclick="markAgentAbsent('PO')" style="border-color:rgba(167,139,250,0.3);color:var(--purple);">🏠 Personal Out</button>
        </div>
      </div>
    </div>

    <!-- ── COACHING TAB ── -->
