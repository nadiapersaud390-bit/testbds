<!-- ── AGENT PROFILE: 🧠 Rebuttal Usage ──
     agent/rebuttal.html
     Loaded by the agent profile panel when this sub-tab is first clicked.
-->

    <div id="ap-rebuttal" style="display:none;">
      <div class="ap-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
          <div class="ap-card-title" style="margin-bottom:0;">🧠 REBUTTAL USAGE HISTORY</div>
          <select id="ap-rebuttal-range" onchange="apLoadRebuttalUsage(currentRepProfile.id,currentRepProfile.name)"
            style="padding:6px 12px;background:#0a1020;border:1px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.75rem;outline:none;">
            <option value="today">Today</option>
            <option value="7">Last 7 Days</option>
            <option value="30">Last 30 Days</option>
            <option value="all">All Time</option>
          </select>
        </div>
        <!-- Summary stats row -->
        <div id="ap-rb-summary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;"></div>
        <!-- Coaching signals for this rep -->
        <div id="ap-rb-signals" style="margin-bottom:14px;"></div>
        <!-- Bar chart of usage -->
        <div style="font-size:0.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">USAGE BY REBUTTAL</div>
        <div id="ap-rb-bars" style="display:flex;flex-direction:column;gap:5px;"></div>
        <!-- Never touched -->
        <div id="ap-rb-never" style="margin-top:14px;"></div>
      </div>
    </div>

  </div><!-- end .agent-panel -->
</div><!-- end overlay -->

<!-- Keep legacy hidden elements so old code references don't break -->
<div style="display:none;">
  <div id="rp-att"></div>
  <div id="rp-coach"><div id="coach-notes-list"></div></div>
  <div id="rp-perf"></div>
  <div id="rp-schedule"></div>
</div>
