<!-- ── AGENT PROFILE: ⏰ Schedule ──
     agent/schedule.html
     Loaded by the agent profile panel when this sub-tab is first clicked.
-->

    <div id="ap-schedule" style="display:none;">
      <div class="ap-card">
        <div class="ap-card-title">⏰ SHIFT &amp; SCHEDULE — saves directly to Google Sheet</div>

        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="background:#060b18;border:1px solid #1a2540;border-radius:10px;padding:14px;">
            <div style="font-size:0.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#60a5fa;margin-bottom:8px;">Shift Time</div>
            <div class="ap-input-row">
              <select id="rp-shift-input" class="ap-input"
                onfocus="this.style.borderColor='#60a5fa'" onblur="this.style.borderColor='#2a3a5a'">
                <option value="">— Select shift —</option>
                <option value="10:00AM - 7:00PM">10:00AM - 7:00PM</option>
                <option value="11:00am-8:00pm">11:00am-8:00pm</option>
                <option value="11:45am-9:00pm">11:45am-9:00pm</option>
                <option value="13:00pm - 22:00pm">13:00pm - 22:00pm</option>
              </select>
              <button class="ap-save-btn" onclick="saveRosterField('shift')">💾 Save</button>
            </div>
            <div id="rp-shift-status" class="ap-field-status"></div>
          </div>

          <div style="background:#060b18;border:1px solid #1a2540;border-radius:10px;padding:14px;">
            <div style="font-size:0.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#34d399;margin-bottom:8px;">Lunch Time</div>
            <div class="ap-input-row">
              <input id="rp-lunch-input" type="text" placeholder="e.g. 3:30-4:00 pm" class="ap-input"
                onfocus="this.style.borderColor='#34d399'" onblur="this.style.borderColor='#2a3a5a'">
              <button class="ap-save-btn" onclick="saveRosterField('lunch')" style="background:#064020;color:#34d399;">💾 Save</button>
            </div>
            <div id="rp-lunch-status" class="ap-field-status"></div>
          </div>

          <div style="background:#060b18;border:1px solid #1a2540;border-radius:10px;padding:14px;">
            <div style="font-size:0.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#fbbf24;margin-bottom:8px;">Break Time <span style="opacity:0.5;">(Firebase only)</span></div>
            <div class="ap-input-row">
              <input id="rp-break-input" type="text" placeholder="e.g. 2:00-2:15 pm" class="ap-input"
                onfocus="this.style.borderColor='#fbbf24'" onblur="this.style.borderColor='#2a3a5a'">
              <button class="ap-save-btn" onclick="saveRosterField('break')" style="background:#1a1000;color:#fbbf24;">💾 Save</button>
            </div>
            <div id="rp-break-status" class="ap-field-status"></div>
          </div>

          <div style="background:#060b18;border:1px solid #1a2540;border-radius:10px;padding:14px;">
            <div style="font-size:0.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;margin-bottom:8px;">Team Assignment</div>
            <div class="ap-input-row">
              <select id="rp-team-input" class="ap-input"
                onfocus="this.style.borderColor='#a78bfa'" onblur="this.style.borderColor='#2a3a5a'">
                <option value="">— Select team —</option>
                <option value="BB">🏠 Berbice (BB)</option>
                <option value="PR">🌴 Providence (PR)</option>
              </select>
              <button class="ap-save-btn" onclick="saveRosterField('team')" style="background:#160e2c;color:#a78bfa;">💾 Save</button>
            </div>
            <div id="rp-team-status" class="ap-field-status"></div>
          </div>
        </div>
        <div style="font-size:0.6rem;color:#64748b;margin-top:12px;text-align:center;">
          Shift &amp; Lunch &amp; Team → Google Sheet · Break → Firebase · Agent sees changes on next login
        </div>
      </div>
    </div>

    <!-- ── AUDIT TAB ── -->
