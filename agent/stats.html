<!-- ── AGENT PROFILE: 📈 Stats History ──
     agent/stats.html
     Loaded by the agent profile panel when this sub-tab is first clicked.
-->

    <div id="ap-stats" style="display:none;">
      <div class="ap-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
          <div class="ap-card-title" style="margin-bottom:0;">📈 PERFORMANCE HISTORY</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button id="sh-view-daily" onclick="shSetView('daily')" style="padding:6px 12px;border-radius:7px;border:1px solid var(--accent);background:#0b1a38;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:800;letter-spacing:1px;cursor:pointer;">📅 DAILY</button>
            <button id="sh-view-weekly" onclick="shSetView('weekly')" style="padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:800;letter-spacing:1px;cursor:pointer;">📆 WEEKLY</button>
            <button id="sh-view-monthly" onclick="shSetView('monthly')" style="padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:800;letter-spacing:1px;cursor:pointer;">🗓 MONTHLY</button>
          </div>
        </div>
        <div id="ap-stats-content">
          <div style="color:var(--muted);text-align:center;padding:30px;font-size:0.82rem;">Loading stats history...</div>
        </div>
      </div>
    </div>
