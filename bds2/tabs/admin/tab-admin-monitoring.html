    <div id="admin-monitoring" class="admin-section" style="display:none;">
      <div class="admin-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div class="admin-card-title" style="margin-bottom:0;font-size:0.9rem;">🎧 LIVE MONITORING</div>
          <button onclick="openMonitoringForm()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--purple);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:800;letter-spacing:1px;cursor:pointer;">＋ Add Session</button>
        </div>

        <!-- Search / filter -->
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          <input type="text" id="monitor-search" placeholder="🔍 Search by rep name..." oninput="filterMonitoringNotes()"
            style="flex:1;min-width:140px;padding:8px 14px;background:#0d1424;border:1.5px solid #2a3a5a;border-radius:8px;color:#e2e8f0;font-size:0.8rem;font-family:'Nunito',sans-serif;outline:none;">
          <select id="monitor-team-filter" onchange="filterMonitoringNotes()"
            style="padding:8px 12px;background:#0d1424;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.8rem;outline:none;">
            <option value="all">All Teams</option>
            <option value="BB">🏠 Berbice</option>
            <option value="PR">🌴 Providence</option>
          </select>
        </div>

        <!-- Add form -->
        <div id="monitoring-form" style="display:none;background:#060d1a;border:1px solid #1a2a45;border-radius:12px;padding:16px;margin-bottom:14px;">
          <div style="font-size:0.65rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:12px;">NEW MONITORING SESSION</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div>
              <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">REP NAME</div>
              <input id="mn-rep" type="text" placeholder="Start typing name..." list="mn-rep-list"
                style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.82rem;font-family:'Nunito',sans-serif;outline:none;box-sizing:border-box;">
              <datalist id="mn-rep-list"></datalist>
            </div>
            <div>
              <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">ADMIN NAME</div>
              <input id="mn-admin" type="text" placeholder="Your name..."
                style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.82rem;font-family:'Nunito',sans-serif;outline:none;box-sizing:border-box;">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div>
              <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">📞 DIAL BEHAVIOR (Voicemails)</div>
              <textarea id="mn-dial" placeholder="Observations on call handling and dispositions..."
                style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.8rem;font-family:'Nunito',sans-serif;outline:none;resize:none;min-height:70px;box-sizing:border-box;"></textarea>
            </div>
            <div>
              <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">🎙 VOICE, ENERGY &amp; TONE</div>
              <textarea id="mn-voice" placeholder="Voice quality, energy level, tone on calls..."
                style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.8rem;font-family:'Nunito',sans-serif;outline:none;resize:none;min-height:70px;box-sizing:border-box;"></textarea>
            </div>
            <div>
              <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">📋 SCRIPT &amp; ENGAGEMENT</div>
              <textarea id="mn-script" placeholder="How well they followed the script..."
                style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.8rem;font-family:'Nunito',sans-serif;outline:none;resize:none;min-height:70px;box-sizing:border-box;"></textarea>
            </div>
            <div>
              <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">🛡 OBJECTION / REBUTTAL HANDLING</div>
              <textarea id="mn-objection" placeholder="How they handled objections live..."
                style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.8rem;font-family:'Nunito',sans-serif;outline:none;resize:none;min-height:70px;box-sizing:border-box;"></textarea>
            </div>
          </div>
          <div style="margin-bottom:10px;">
            <div style="font-size:0.6rem;color:var(--muted);font-weight:700;margin-bottom:4px;">⭐ COACHING POINTS (feedback from this session)</div>
            <textarea id="mn-points" placeholder="Key takeaways and what the rep should focus on..."
              style="width:100%;padding:8px 12px;background:#090f1e;border:1.5px solid #2a3a5a;border-radius:8px;color:var(--text);font-size:0.8rem;font-family:'Nunito',sans-serif;outline:none;resize:none;min-height:60px;box-sizing:border-box;"></textarea>
          </div>
          <div id="mn-save-status" style="font-size:0.68rem;min-height:18px;margin-bottom:8px;"></div>
          <div style="display:flex;gap:8px;">
            <button onclick="saveMonitoringNote()" style="flex:1;padding:11px;border-radius:8px;border:none;background:var(--purple);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:800;letter-spacing:1px;cursor:pointer;">💾 SAVE SESSION</button>
            <button onclick="closeMonitoringForm()" style="padding:11px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:800;cursor:pointer;">Cancel</button>
          </div>
        </div>

        <!-- Sessions list -->
        <div id="monitoring-notes-feed">
          <div style="text-align:center;color:var(--muted);padding:24px;font-size:0.82rem;">Loading monitoring sessions...</div>
        </div>
      </div>
    </div>

    <!-- ── REBUTTAL INTEL ── -->
