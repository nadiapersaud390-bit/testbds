    <div id="admin-weekperf" class="admin-section" style="display:none;">
      <div class="admin-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
          <div class="admin-card-title" style="margin-bottom:0;">🏆 WEEKLY PERFORMANCE — TRANSFERS</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
            <span id="wp-week-label" style="font-size:0.68rem;color:var(--gold);font-weight:700;"></span>
            <select id="wp-week-select" onchange="renderWeeklyPerformance()" style="padding:7px 12px;background:#0d1424;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.78rem;outline:none;"></select>
            <button onclick="loadWeeklyPerformance()" style="padding:7px 12px;border-radius:8px;border:none;background:#1a2a45;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:800;letter-spacing:1px;cursor:pointer;">🔄 REFRESH</button>
          </div>
        </div>

        <!-- Team filter tabs -->
        <div style="display:flex;gap:6px;margin-bottom:14px;">
          <button id="wp-all"  onclick="wpSetTeam('all',this)"  style="flex:1;padding:10px;border-radius:9px;border:2px solid var(--accent);background:#0b1a38;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:800;letter-spacing:1.5px;cursor:pointer;">ALL TEAMS</button>
          <button id="wp-bb"   onclick="wpSetTeam('BB',this)"   style="flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:800;letter-spacing:1.5px;cursor:pointer;">🏠 BERBICE</button>
          <button id="wp-pr"   onclick="wpSetTeam('PR',this)"   style="flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:800;letter-spacing:1.5px;cursor:pointer;">🌴 PROVIDENCE</button>
        </div>

        <!-- Summary cards -->
        <div id="wp-summary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px;"></div>

        <!-- Leaderboard -->
        <div id="wp-content">
          <div style="text-align:center;color:var(--muted);padding:40px;font-size:0.85rem;">⏳ Loading weekly performance...</div>
        </div>
      </div>
    </div>
  </div>
